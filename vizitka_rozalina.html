  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #131936;
      --accent1: #a78bfa;
      --accent2: #60a5fa;
      --accent3: #f472b6;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 420px; height: 420px; background: var(--accent1); top: -120px; left: -120px; animation-duration: 14s; }
    .orb2 { width: 320px; height: 320px; background: var(--accent2); bottom: -80px; right: -80px; animation-duration: 10s; animation-delay: -4s; }
    .orb3 { width: 260px; height: 260px; background: var(--accent3); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-duration: 16s; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(26, 34, 69, 0.72);
      border: 1px solid rgba(167, 139, 250, 0.18);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 440px;
      width: 92vw;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 48px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: appear 0.7s cubic-bezier(.34,1.3,.64,1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(32px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Avatar monogram */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 4px rgba(167,139,250,0.2), 0 0 32px rgba(167,139,250,0.3);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 4px rgba(167,139,250,0.2), 0 0 32px rgba(167,139,250,0.3); }
      50%       { box-shadow: 0 0 0 8px rgba(167,139,250,0.1), 0 0 52px rgba(167,139,250,0.45); }
    }

    /* Name */
    .name {
      text-align: center;
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #c4b5fd 0%, #93c5fd 45%, #f9a8d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(167,139,250,0.55));
      margin-bottom: 8px;
    }

    /* Tagline */
    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* Skill tags */
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 36px;
    }
    .skill {
      padding: 7px 18px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      border: 1px solid;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      cursor: default;
    }
    .skill:hover { transform: translateY(-2px); }

    .skill-p { color: var(--accent1); border-color: rgba(167,139,250,0.35); background: rgba(167,139,250,0.08); }
    .skill-p:hover { box-shadow: 0 0 16px rgba(167,139,250,0.4); }
    .skill-l { color: var(--accent2); border-color: rgba(96,165,250,0.35); background: rgba(96,165,250,0.08); }
    .skill-l:hover { box-shadow: 0 0 16px rgba(96,165,250,0.4); }
    .skill-b { color: var(--accent3); border-color: rgba(244,114,182,0.35); background: rgba(244,114,182,0.08); }
    .skill-b:hover { box-shadow: 0 0 16px rgba(244,114,182,0.4); }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.25), transparent);
      margin-bottom: 32px;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 32px;
    }
    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.22s cubic-bezier(.34,1.5,.64,1), box-shadow 0.22s ease, background 0.22s ease, color 0.22s ease;
      color: var(--muted);
      text-decoration: none;
    }
    .social-link:hover { transform: translateY(-4px) scale(1.1); }

    .social-link.tg:hover  { background: rgba(39,174,233,0.18); box-shadow: 0 0 22px rgba(39,174,233,0.4); color: #29aee9; }
    .social-link.vk:hover  { background: rgba(0,119,255,0.18);  box-shadow: 0 0 22px rgba(0,119,255,0.4);  color: #4c82d4; }
    .social-link.inst:hover{ background: rgba(225,48,108,0.18); box-shadow: 0 0 22px rgba(225,48,108,0.4); color: #e1306c; }

    .social-link svg { width: 22px; height: 22px; fill: currentColor; transition: fill 0.2s; }

    /* CTA button */
    .cta-wrap { display: flex; justify-content: center; }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(.34,1.5,.64,1), box-shadow 0.2s ease;
      box-shadow: 0 4px 24px rgba(124,58,237,0.45);
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #9f5cf7, #38bdf8);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .cta:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 36px rgba(124,58,237,0.6); }
    .cta:hover::before { opacity: 1; }
    .cta:active { transform: scale(0.97); }
    .cta span, .cta svg { position: relative; z-index: 1; }

    .cta-arrow {
      width: 18px;
      height: 18px;
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(4px); }
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      .name { font-size: 2rem; }
    }
  </style>
</head>
