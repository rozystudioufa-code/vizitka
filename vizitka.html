<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сунгатова Разиля — Нейростратег</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #080810;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }

    /* ── Orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
    }
    .orb1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(168,85,247,0.13), transparent 70%);
      top: -80px; left: -80px;
    }
    .orb2 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(99,102,241,0.1), transparent 70%);
      bottom: -60px; right: -60px;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 2;
      width: min(380px, 100%);
      border-radius: 28px;
      overflow: hidden;
      background: #0e0e18;
      border: 1px solid rgba(168,85,247,0.18);
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.06),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(168,85,247,0.07);
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(36px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Photo block ── */
    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* gradient fade into card body */
    .photo-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(14,14,24,0.5) 70%,
        rgba(14,14,24,1) 100%
      );
    }

    /* subtle purple tint overlay */
    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(99,102,241,0.08) 0%,
        transparent 60%
      );
      z-index: 1;
    }

    /* ── Content ── */
    .content {
      padding: 0 1.5rem 1.25rem;
      margin-top: -2rem;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    /* ── Role badge ── */
    .role {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(200,160,255,0.85);
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.22);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 0.55rem;
    }

    .role-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #a855f7;
      box-shadow: 0 0 6px #a855f7;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    /* ── Name ── */
    .name {
      font-size: clamp(1.6rem, 6vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
      background: linear-gradient(135deg, #ffffff 0%, #d8b4fe 50%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(168,85,247,0.45));
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(168,85,247,0.3)); }
      to   { filter: drop-shadow(0 0 24px rgba(168,85,247,0.75)); }
    }

    /* ── Divider ── */
    .divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, #a855f7, transparent);
      border-radius: 2px;
      margin: 0 auto 0.9rem;
    }

    /* ── Bio ── */
    .bio {
      font-size: 0.88rem;
      color: rgba(180,180,210,0.7);
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    /* ── Socials ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .social-link {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(200,200,230,0.6);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .social-link svg { width: 19px; height: 19px; }

    .social-link:hover {
      background: rgba(168,85,247,0.2);
      border-color: rgba(168,85,247,0.45);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(168,85,247,0.3);
    }

    /* ── CTA ── */
    .cta-wrap { position: relative; display: inline-block; }

    .pulse-ring {
      position: absolute; inset: -7px;
      border-radius: 100px;
      border: 1.5px solid rgba(168,85,247,0.35);
      animation: pulse 2.5s ease-out infinite;
    }

    @keyframes pulse {
      0%  { transform: scale(0.96); opacity: 0.7; }
      70% { transform: scale(1.07); opacity: 0; }
      100%{ transform: scale(1.07); opacity: 0; }
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.8rem 2rem;
      border-radius: 100px;
      background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
      box-shadow: 0 4px 22px rgba(168,85,247,0.38);
    }

    .cta::after {
      content: '';
      position: absolute;
      width: 130%; height: 100%;
      top: 0; left: -120%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .cta:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 28px rgba(168,85,247,0.55); }
    .cta:hover::after { left: 120%; }
    .cta svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.68rem;
      color: rgba(148,163,184,0.3);
      letter-spacing: 0.06em;
    }
  </style>
</head>
